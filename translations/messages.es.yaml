home.crawler_tasks_text: "Qué hace el rastreador:"
home.crawler_task_1: "Si se proporcionan IDs, solo procesa esas fuentes de datos específicas."
home.crawler_task_2: "Si se utiliza la opción --skip, filtra los IDs especificados."
home.crawler_task_3: "Si se utiliza --parallel (o -p), genera subprocesos separados para cada fuente de datos para acelerar el proceso."
home.crawler_task_4: "La opción --concurrency (o -c) controla el número máximo de procesos simultáneos (el valor predeterminado es 5)."
home.crawler_task_5: "Si se utiliza --limit (o -l), restringe el número de registros de metadatos indexados por fuente de datos. Esto es muy útil para realizar pruebas sin un rastreo completo."
home.crawler_task_6: "Si se utiliza --clear-index, elimina y recrea el índice de Elasticsearch antes de comenzar el rastreo. Esto es obligatorio al corregir conflictos de mapeo."
home.crawler_task_7: "Obtiene todos los IDs de las fuentes de datos y los metadatos de la API de registros ODIS-Arch."
home.crawler_task_8: "Analiza cada fuente para obtener la URL de ODIS-Arch y el tipo de ODIS-Arch."
home.crawler_task_9: "Analiza sitemaps o archivos JSON-LD directos de Sitegraph."
home.crawler_task_10: "Indexa los metadatos extraídos en el índice odis_metadata en Elasticsearch."
home.crawler_task_11: "Los rastreos sucesivos actualizan las entradas existentes en lugar de crear duplicados, lo que garantiza un conjunto de datos acumulativo."
home.crawler_task_12: "Los registros detallados de todos los problemas se rastrean y se pueden ver en el panel del rastreador."
home.crawler_task_13: "Si se utiliza --graph (o -g), guarda todos los metadatos extraídos en un archivo JSON-LD Lines compatible con SPARQL."
home.searching_monitoring: "2. Búsqueda y monitoreo"
home.searching_monitoring_text_1: "Puede utilizar la interfaz de búsqueda integrada para consultar los metadatos indexados. Utiliza una consulta multi_match de Elasticsearch en los campos de nombre, descripción y palabras clave."
home.searching_monitoring_text_2: "Haga clic aquí para abrir la interfaz de búsqueda."
home.searching_monitoring_text_3: "Para el monitoreo del rastreo en tiempo real y el seguimiento de errores, visite el Panel del rastreador."
