home.crawler_tasks_text: "爬虫执行的操作："
home.crawler_task_1: "如果提供了 ID，它只处理这些特定的数据源。"
home.crawler_task_2: "如果使用了 --skip 选项，它将过滤掉指定的 ID。"
home.crawler_task_3: "如果使用了 --parallel（或 -p），它将为每个数据源产生独立的子进程，以加快处理速度。"
home.crawler_task_4: "使用 --concurrency（或 -c）选项控制同时进行的最大进程数（默认为 5）。"
home.crawler_task_5: "如果使用了 --limit（或 -l），它会限制每个数据源索引的元数据记录数。这在测试时非常有用。"
home.crawler_task_6: "如果使用了 --clear-index，它会在开始爬取之前删除并重新创建 Elasticsearch 索引。修复映射冲突时这是强制性的。"
home.crawler_task_7: "从 ODIS-Arch 记录 API 获取所有数据源 ID 和元数据。"
home.crawler_task_8: "分析每个源的 ODIS-Arch URL 和 ODIS-Arch 类型。"
home.crawler_task_9: "解析 Sitemap 或直接的 Sitegraph JSON-LD 文件。"
home.crawler_task_10: "将提取的元数据索引到 Elasticsearch 的 odis_metadata 索引中。"
home.crawler_task_11: "连续的爬取将更新现有条目而不是创建重复条目，确保数据集是累积的。"
home.crawler_task_12: "所有问题的详细日志都会被跟踪，并可在爬虫仪表板中查看。"
home.searching_monitoring: "2. 搜索与监控"
home.searching_monitoring_text_1: "您可以使用内置的搜索界面来查询已索引的元数据。它使用 Elasticsearch 的 multi_match 查询，涵盖名称、描述和关键词字段。"
home.searching_monitoring_text_2: "点击这里打开搜索界面。"
home.searching_monitoring_text_3: "如需实时监控爬取进度和跟踪错误，请访问爬虫仪表板。"
