home.clear_everything_text: "Effacer à la fois Elasticsearch et les statistiques de la base de données locale :"
home.clear_stats_title: "2. Effacer UNIQUEMENT les statistiques et rapports :"
home.clear_stats_text: "Vider la table de l'historique du crawl mais conserver l'index de recherche :"
home.clear_index_title: "3. Effacer UNIQUEMENT l'index Elasticsearch :"
home.clear_index_text: "Supprimer et recréer l'index des métadonnées :"
home.clear_logs_title: "4. Effacer les fichiers journaux :"
home.clear_logs_text: "Supprimer tous les journaux de crawl temporaires :"
