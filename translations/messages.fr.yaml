home.title: "ODIS Metadata Crawler & Search"
home.lead: "Cette application est conçue pour trouver, indexer et rechercher les métadonnées JSON-LD d'ODIS (Ocean Data and Information System)."
home.built_with: "Construit avec Symfony 8.0 et Elasticsearch."
