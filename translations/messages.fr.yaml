home.crawler_tasks_text: "Ce que fait le crawler :"
home.crawler_task_1: "Si des ID sont fournis, il ne traite que ces sources de données spécifiques."
home.crawler_task_2: "Si l'option --skip est utilisée, il filtre les ID spécifiés."
home.crawler_task_3: "Si --parallel (ou -p) est utilisé, il lance des sous-processus séparés pour chaque source de données afin d'accélérer le processus."
home.crawler_task_4: "L'option --concurrency (ou -c) contrôle le nombre maximum de processus simultanés (par défaut 5)."
home.crawler_task_5: "Si --limit (ou -l) est utilisé, il restreint le nombre d'enregistrements de métadonnées indexés par source de données. C'est très utile pour tester sans effectuer un crawl complet."
home.crawler_task_6: "Si --clear-index est utilisé, il supprime et recrée l'index Elasticsearch avant de commencer le crawl. C'est obligatoire lors de la résolution de conflits de mappage."
home.crawler_task_7: "Récupère tous les ID de source de données et les métadonnées de l'API ODIS-Arch Records."
home.crawler_task_8: "Analyse chaque source pour l'URL ODIS-Arch et le type ODIS-Arch."
home.crawler_task_9: "Analyse les Sitemaps ou les fichiers JSON-LD directs du Sitegraph."
home.crawler_task_10: "Indexe les métadonnées extraites dans l'index odis_metadata dans Elasticsearch."
home.crawler_task_11: "Les crawls successifs mettent à jour les entrées existantes au lieu de créer des doublons, garantissant un ensemble de données cumulatif."
home.crawler_task_12: "Les journaux détaillés de tous les problèmes sont suivis et consultables dans le tableau de bord du crawler."
home.searching_monitoring: "2. Recherche et surveillance"
home.searching_monitoring_text_1: "Vous pouvez utiliser l'interface de recherche intégrée pour interroger les métadonnées indexées. Elle utilise une requête multi_match Elasticsearch sur les champs name, description et keywords."
home.searching_monitoring_text_2: "Cliquez ici pour ouvrir l'interface de recherche."
home.searching_monitoring_text_3: "Pour la surveillance du crawl en temps réel et le suivi des erreurs, visitez le Crawler Dashboard."
home.configuration: "3. Configuration"
home.configuration_text: "Les variables d'environnement dans le fichier .env contrôlent la connexion Elasticsearch :"
