home.crawler_tasks_text: "What the crawler does:"
home.crawler_task_1: "If IDs are provided, it only processes those specific data sources."
home.crawler_task_2: "If the --skip option is used, it filters out the specified IDs."
home.crawler_task_3: "If --parallel (or -p) is used, it spawns separate sub-processes for each datasource to speed up the process."
home.crawler_task_4: "The --concurrency (or -c) option controls the maximum number of simultaneous processes (default is 5)."
home.crawler_task_5: "If --limit (or -l) is used, it restricts the number of metadata records indexed per data source. This is very useful for testing without performing a full crawl."
home.crawler_task_6: "If --clear-index is used, it deletes and recreates the Elasticsearch index before starting the crawl. This is mandatory when fixing mapping conflicts."
home.crawler_task_7: "Fetches all data source IDs and metadata from the ODIS-Arch Records API."
home.crawler_task_8: "Analyzes each source for ODIS-Arch URL and ODIS-Arch Type."
home.crawler_task_9: "Parses Sitemaps or direct Sitegraph JSON-LD files."
home.crawler_task_10: "Indexes the extracted metadata into the odis_metadata index in Elasticsearch."
home.crawler_task_11: "Successive crawls update existing entries instead of creating duplicates, ensuring a cumulative dataset."
home.crawler_task_12: "Detailed logs of all issues are tracked and viewable in the Crawler Dashboard."
home.searching_monitoring: "2. Searching & Monitoring"
home.searching_monitoring_text_1: "You can use the built-in search interface to query the indexed metadata. It uses an Elasticsearch multi_match query across name, description, and keywords fields."
home.searching_monitoring_text_2: "Click here to open the search interface."
home.searching_monitoring_text_3: "For real-time crawl monitoring and error tracking, visit the Crawler Dashboard."
