home.title: "ODIS Metadata Crawler & Search"
home.lead: "Это приложение предназначено для поиска, индексации и поиска метаданных ODIS (Океаническая система данных и информации) в формате JSON-LD."
home.built_with: "Создано на базе Symfony 8.0 и Elasticsearch."
home.go_to_search: "Перейти к поиску"
home.usage_doc: "Документация по использованию"
home.crawling_indexing: "1. Сканирование и индексация"
home.crawling_indexing_text: "Основная функциональность обеспечивается командой Symfony, которая извлекает все записи ODIS-Arch из API каталога, извлекает ссылки на метаданные и индексирует содержимое в Elasticsearch."
home.run_crawler: "Запустить сканер:"
home.complete_crawl: "Полное сканирование:"
home.targeted_crawl: "Целевое сканирование (по ID):"
home.skip_ids: "Пропустить определенные ID:"
home.parallel_crawl: "Параллельное сканирование:"
home.testing_limits: "Тестирование с лимитами:"
home.clear_index: "Очистить индекс:"
home.clear_stats: "Очистить статистику и отчеты:"
home.clear_everything: "Очистить ВСЕ:"
home.verbose_output: "Подробный вывод:"
home.crawler_tasks: "Что делает сканер:"
home.system_status: "Статус системы"
home.quick_links: "Быстрые ссылки"
home.crawler_tasks_text: "Что делает сканер:"
home.crawler_task_1: "Если указаны ID, обрабатываются только эти конкретные источники данных."
home.crawler_task_2: "Если используется опция --skip, указанные ID фильтруются."
home.crawler_task_3: "Если используется --parallel (или -p), запускаются отдельные подпроцессы для каждого источника данных, чтобы ускорить процесс."
home.crawler_task_4: "Опция --concurrency (или -c) контролирует максимальное количество одновременных процессов (по умолчанию 5)."
home.crawler_task_5: "Если используется --limit (или -l), ограничивается количество проиндексированных записей метаданных на источник данных. Это полезно для тестирования."
home.crawler_task_6: "Если используется --clear-index, индекс Elasticsearch удаляется и создается заново перед началом сканирования. Это обязательно при исправлении конфликтов маппинга."
home.crawler_task_7: "Извлекает все ID источников данных и метаданные из ODIS-Arch Records API."
home.crawler_task_8: "Анализирует каждый источник на наличие ODIS-Arch URL и ODIS-Arch Type."
home.crawler_task_9: "Парсит Sitemaps или прямые файлы Sitegraph JSON-LD."
home.crawler_task_10: "Индексирует извлеченные метаданные в индекс odis_metadata в Elasticsearch."
home.crawler_task_11: "Последующие сканирования обновляют существующие записи вместо создания дубликатов."
home.crawler_task_12: "Подробные логи всех проблем отслеживаются и доступны для просмотра в Панели управления сканером."
home.searching_monitoring: "2. Поиск и мониторинг"
home.searching_monitoring_text_1: "Вы можете использовать встроенный интерфейс поиска для запроса проиндексированных метаданных. Он использует запрос Elasticsearch multi_match по полям name, description и keywords."
home.searching_monitoring_text_2: "Нажмите здесь, чтобы открыть интерфейс поиска."
home.searching_monitoring_text_3: "Для мониторинга сканирования в реальном времени и отслеживания ошибок посетите Панель управления сканером."
home.configuration: "3. Конфигурация"
home.configuration_text: "Переменные окружения в файле .env управляют подключением к Elasticsearch:"
home.resetting_data: "4. Сброс данных проекта"
home.resetting_data_text: "Чтобы очистить все данные и начать с нуля, вы можете использовать встроенную команду обслуживания или кнопку в Панели управления:"
home.clear_everything_title: "1. Очистить все (индекс + статистика):"
home.clear_everything_text: "Очистить как Elasticsearch, так и локальную статистику базы данных:"
home.clear_stats_title: "2. Очистить ТОЛЬКО статистику и отчеты:"
home.clear_stats_text: "Очистить таблицу истории сканирований, но сохранить поисковый индекс:"
home.clear_index_title: "3. Очистить ТОЛЬКО индекс Elasticsearch:"
home.clear_index_text: "Удалить и создать заново индекс метаданных:"
home.clear_logs_title: "4. Очистить файлы логов:"
home.clear_logs_text: "Удалить все временные логи сканирования:"
home.destructive_warning: "Предупреждение: эти операции являются деструктивными и не могут быть отменены. Все проиндексированные метаданные и история сканирований будут потеряны."
